name: Build artifacts

# Shared artifact-build block. Called by release.yml + nightly.yml.
# Produces:
#   * PhotoManager-CLI-<rid>-<version>.zip   for win-x64, linux-x64, osx-arm64
#   * PhotoManager-UI-<rid>-<version>.zip    for win-x64, linux-x64, osx-arm64 (Avalonia)
#   * PhotoManager.Core.<version>.nupkg      (release only)
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release-kind:
        required: true
        type: string
      changelog-flag:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""
    outputs:
      cli-win-artifact:
        value: ${{ jobs.build-exe.outputs.cli-win-artifact }}
      cli-linux-artifact:
        value: ${{ jobs.build-exe.outputs.cli-linux-artifact }}
      cli-osx-artifact:
        value: ${{ jobs.build-exe.outputs.cli-osx-artifact }}
      ui-win-artifact:
        value: ${{ jobs.build-exe.outputs.ui-win-artifact }}
      ui-linux-artifact:
        value: ${{ jobs.build-exe.outputs.ui-linux-artifact }}
      ui-osx-artifact:
        value: ${{ jobs.build-exe.outputs.ui-osx-artifact }}
      nuget-artifact:
        value: ${{ jobs.pack-nuget.outputs.artifact-name }}

jobs:
  build-exe:
    runs-on: ubuntu-latest
    outputs:
      cli-win-artifact:   PhotoManager-CLI-win-x64-${{ inputs.version }}
      cli-linux-artifact: PhotoManager-CLI-linux-x64-${{ inputs.version }}
      cli-osx-artifact:   PhotoManager-CLI-osx-arm64-${{ inputs.version }}
      ui-win-artifact:    PhotoManager-UI-win-x64-${{ inputs.version }}
      ui-linux-artifact:  PhotoManager-UI-linux-x64-${{ inputs.version }}
      ui-osx-artifact:    PhotoManager-UI-osx-arm64-${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # PhotoManager.Core has a sibling-repo ProjectReference to
      # ..\..\CompressionWorkbench\FileFormat.JpegArchive\... — clone it
      # next to the PhotoManager checkout so the relative path resolves.
      - name: Clone sibling CompressionWorkbench
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/CompressionWorkbench.git "$GITHUB_WORKSPACE/../CompressionWorkbench"

      - name: Clone sibling PNGCrushCS (RAW readers)
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/PNGCrushCS.git "$GITHUB_WORKSPACE/../PNGCrushCS"

      - name: Update CHANGELOG
        run: node .github/workflows/scripts/update-changelog.mjs ${{ inputs.changelog-flag }}

      - name: Stamp versions into csprojs
        run: perl .github/workflows/scripts/version.pl --stamp

      # CLI
      - name: Publish CLI (win-x64)
        run: dotnet publish PhotoManager.CLI/PhotoManager.CLI.csproj -r win-x64 -c Release --self-contained --output publish/cli-win
      - name: Publish CLI (linux-x64)
        run: dotnet publish PhotoManager.CLI/PhotoManager.CLI.csproj -r linux-x64 -c Release --self-contained --output publish/cli-linux
      - name: Publish CLI (osx-arm64)
        run: dotnet publish PhotoManager.CLI/PhotoManager.CLI.csproj -r osx-arm64 -c Release --self-contained --output publish/cli-osx

      # UI (Avalonia, cross-platform)
      - name: Publish UI (win-x64)
        run: dotnet publish PhotoManager.UI/PhotoManager.UI.csproj -r win-x64 -c Release --self-contained --output publish/ui-win
      - name: Publish UI (linux-x64)
        run: dotnet publish PhotoManager.UI/PhotoManager.UI.csproj -r linux-x64 -c Release --self-contained --output publish/ui-linux
      - name: Publish UI (osx-arm64)
        run: dotnet publish PhotoManager.UI/PhotoManager.UI.csproj -r osx-arm64 -c Release --self-contained --output publish/ui-osx

      - name: Package zips
        run: |
          V="${{ inputs.version }}"
          cd publish
          (cd cli-win    && zip -r "../../PhotoManager-CLI-win-x64-$V.zip"    .)
          (cd cli-linux  && zip -r "../../PhotoManager-CLI-linux-x64-$V.zip"  .)
          (cd cli-osx    && zip -r "../../PhotoManager-CLI-osx-arm64-$V.zip"  .)
          (cd ui-win     && zip -r "../../PhotoManager-UI-win-x64-$V.zip"     .)
          (cd ui-linux   && zip -r "../../PhotoManager-UI-linux-x64-$V.zip"   .)
          (cd ui-osx     && zip -r "../../PhotoManager-UI-osx-arm64-$V.zip"   .)

      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManager-CLI-win-x64-${{ inputs.version }}
          path: PhotoManager-CLI-win-x64-${{ inputs.version }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManager-CLI-linux-x64-${{ inputs.version }}
          path: PhotoManager-CLI-linux-x64-${{ inputs.version }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManager-CLI-osx-arm64-${{ inputs.version }}
          path: PhotoManager-CLI-osx-arm64-${{ inputs.version }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManager-UI-win-x64-${{ inputs.version }}
          path: PhotoManager-UI-win-x64-${{ inputs.version }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManager-UI-linux-x64-${{ inputs.version }}
          path: PhotoManager-UI-linux-x64-${{ inputs.version }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManager-UI-osx-arm64-${{ inputs.version }}
          path: PhotoManager-UI-osx-arm64-${{ inputs.version }}.zip

  pack-nuget:
    if: inputs.release-kind == 'release'
    runs-on: ubuntu-latest
    outputs:
      artifact-name: PhotoManagerCore-nupkg-${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Clone sibling CompressionWorkbench
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/CompressionWorkbench.git "$GITHUB_WORKSPACE/../CompressionWorkbench"

      - name: Clone sibling PNGCrushCS (RAW readers)
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/PNGCrushCS.git "$GITHUB_WORKSPACE/../PNGCrushCS"

      - name: Stamp versions into csprojs
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Pack NuGet
        run: dotnet pack PhotoManager.Core/PhotoManager.Core.csproj --configuration Release --output artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: PhotoManagerCore-nupkg-${{ inputs.version }}
          path: artifacts/*.nupkg
