name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call: {}
  workflow_dispatch: {}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # PhotoManager.Core has a sibling-repo ProjectReference to
      # ..\..\CompressionWorkbench\FileFormat.JpegArchive\... so the runner
      # needs that repo cloned next to the PhotoManager checkout. Default
      # GITHUB_WORKSPACE is .../work/PhotoManager/PhotoManager, so cloning
      # to ../CompressionWorkbench lands it at the path the csproj expects.
      - name: Clone sibling CompressionWorkbench
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/CompressionWorkbench.git "$GITHUB_WORKSPACE/../CompressionWorkbench"

      - name: Clone sibling PNGCrushCS (RAW readers)
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/PNGCrushCS.git "$GITHUB_WORKSPACE/../PNGCrushCS"

      - name: Stamp versions into csprojs
        shell: bash
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Restore
        run: dotnet restore PhotoManager.slnx

      - name: Build
        run: dotnet build PhotoManager.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PhotoManager.Tests/PhotoManager.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Clone sibling CompressionWorkbench
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/CompressionWorkbench.git "$GITHUB_WORKSPACE/../CompressionWorkbench"

      - name: Clone sibling PNGCrushCS (RAW readers)
        shell: bash
        run: git clone --depth=1 https://github.com/Hawkynt/PNGCrushCS.git "$GITHUB_WORKSPACE/../PNGCrushCS"

      - name: Stamp versions
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Test with coverage
        run: dotnet test PhotoManager.Tests/PhotoManager.Tests.csproj --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:./coverage/**/coverage.cobertura.xml -targetdir:./coverage/report -reporttypes:HtmlInline_AzurePipelines

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report
