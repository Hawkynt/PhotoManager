name: Release

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual release trigger'
        required: false

permissions:
  contents: write

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          V=$(perl .github/workflows/scripts/version.pl)
          echo "version=$V" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      release-kind: release
      changelog-flag: --release v${{ needs.version.outputs.version }}

  publish-github:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.cli-win-artifact }}",   path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.cli-linux-artifact }}", path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.cli-osx-artifact }}",   path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.ui-win-artifact }}",    path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.ui-linux-artifact }}",  path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.ui-osx-artifact }}",    path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.nuget-artifact }}",     path: dist }

      # Notes = a short curated header + the commit-prefix changelog (+ - * # !),
      # NOT GitHub's PR-based "What's Changed".
      - name: Compose release notes
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          node .github/workflows/scripts/update-changelog.mjs --release "v$V" --notes CHANGES.md
          echo "## PhotoManager v$V" > RELEASE_NOTES.md
          echo >> RELEASE_NOTES.md
          cat CHANGES.md >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: |
            dist/*.zip
            dist/*.nupkg
          body_path: RELEASE_NOTES.md

  publish-nuget:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.nuget-artifact }}", path: artifacts }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.x' }
      - name: Push to nuget.org
        run: dotnet nuget push artifacts/*.nupkg -k "${{ secrets.NUGET_TOKEN }}" -s https://api.nuget.org/v3/index.json --skip-duplicate
